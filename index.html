<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0f1219">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>FMLab Tiny</title>
<style>
  :root {
    --bg: #0f1219;
    --panel: #151923;
    --border: #242938;
    --text: #e6e9ef;
    --muted: #8a92a6;
    --teal: #22b8a0;
    --lcd: #a0c048;
    --lcd-dim: #4a5a20;
    --red: #ef4444;
    --key-white: #efe8d8;
    --key-white-press: #c8d48a;
    --key-black: #1a1a1a;
    --key-black-press: #22b8a0;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
    min-height: 100dvh;
    overflow: hidden;
    overscroll-behavior: contain;
    -webkit-font-smoothing: antialiased;
    user-select: none;
    -webkit-user-select: none;
  }
  .app {
    display: flex;
    flex-direction: column;
    min-height: 100dvh;
    padding-top: env(safe-area-inset-top);
    padding-bottom: env(safe-area-inset-bottom);
  }
  header {
    padding: 12px 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid var(--border);
  }
  h1 {
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.12em;
    color: var(--muted);
  }
  h1 span { color: var(--teal); }
  .badge {
    font-family: ui-monospace, Menlo, monospace;
    font-size: 11px;
    color: var(--muted);
    background: var(--panel);
    padding: 4px 8px;
    border-radius: 4px;
    border: 1px solid var(--border);
  }
  .stage {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 16px;
    gap: 16px;
    min-height: 140px;
  }
  .patch-name {
    font-family: ui-monospace, Menlo, monospace;
    font-size: 28px;
    color: var(--lcd);
    letter-spacing: 0.08em;
    text-shadow: 0 0 12px rgba(160, 192, 72, 0.35);
    background: #1a1d12;
    border: 1px solid var(--border);
    padding: 10px 20px;
    border-radius: 4px;
    min-width: 220px;
    text-align: center;
  }
  .patch-sub {
    font-family: ui-monospace, Menlo, monospace;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.15em;
  }
  .op-dots {
    display: flex;
    gap: 8px;
  }
  .op-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: var(--border);
    transition: background 80ms;
  }
  .op-dot.on { background: var(--teal); box-shadow: 0 0 8px var(--teal); }
  .controls {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    padding: 8px 16px;
  }
  .ctrl-btn {
    min-width: 56px;
    height: 44px;
    background: var(--panel);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 8px;
    font-family: ui-monospace, Menlo, monospace;
    font-size: 18px;
    font-weight: 600;
    cursor: pointer;
    touch-action: manipulation;
  }
  .ctrl-btn:active { background: var(--teal); color: #06110e; }
  .octave-display {
    font-family: ui-monospace, Menlo, monospace;
    font-size: 13px;
    color: var(--lcd);
    min-width: 88px;
    text-align: center;
    padding: 8px 12px;
    background: #1a1d12;
    border: 1px solid var(--border);
    border-radius: 4px;
  }
  .keybed-wrap {
    height: 200px;
    background: #000;
    border-top: 1px solid var(--border);
    position: relative;
  }
  #keybed {
    width: 100%;
    height: 100%;
    display: block;
    touch-action: none;
  }
  .splash {
    position: fixed;
    inset: 0;
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    background: var(--bg);
    padding: 24px;
    text-align: center;
  }
  .splash.hidden { display: none; }
  .splash .title {
    font-size: 32px;
    color: var(--lcd);
    font-family: ui-monospace, Menlo, monospace;
    letter-spacing: 0.1em;
    text-shadow: 0 0 16px rgba(160, 192, 72, 0.4);
  }
  .splash .subtitle {
    font-size: 13px;
    color: var(--muted);
    font-family: ui-monospace, Menlo, monospace;
    max-width: 280px;
    line-height: 1.5;
  }
  .splash button {
    margin-top: 12px;
    padding: 14px 28px;
    background: var(--teal);
    color: #06110e;
    border: none;
    border-radius: 8px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    touch-action: manipulation;
    min-height: 48px;
    min-width: 160px;
  }
  .err-msg {
    color: var(--red);
    font-size: 11px;
    font-family: ui-monospace, Menlo, monospace;
    padding: 8px 16px;
    min-height: 28px;
    text-align: center;
    word-break: break-word;
  }
</style>
</head>
<body>

<div class="splash" id="splash">
  <div class="title">FMLab</div>
  <div class="subtitle">Tiny edition — 2-op FM synth. Tap Start, grant nothing, play anywhere.</div>
  <button id="startBtn">Start</button>
  <div class="err-msg" id="err"></div>
</div>

<div class="app" id="app" style="visibility:hidden;">
  <header>
    <h1>FM<span>Lab</span> TINY</h1>
    <div class="badge" id="voices">0/6 voices</div>
  </header>

  <div class="stage">
    <div class="patch-name" id="patchName">INIT EP</div>
    <div class="patch-sub">2-OP FM · RATIO 1:1 · INDEX 2.4</div>
    <div class="op-dots" aria-label="Operator activity">
      <div class="op-dot" id="op1"></div>
      <div class="op-dot" id="op2"></div>
    </div>
  </div>

  <div class="controls">
    <button class="ctrl-btn" id="octDown" aria-label="Octave down">◀</button>
    <div class="octave-display" id="octDisplay">C3 — C5</div>
    <button class="ctrl-btn" id="octUp" aria-label="Octave up">▶</button>
  </div>

  <div class="keybed-wrap">
    <canvas id="keybed"></canvas>
  </div>
</div>

<script>
// ---- Global error surfacing (lesson from MotionProof) ----
const errEl = document.getElementById('err');
window.addEventListener('error', (e) => {
  if (errEl) errEl.textContent = 'ERR: ' + (e.message || 'script error');
});
window.addEventListener('unhandledrejection', (e) => {
  if (errEl) errEl.textContent = 'REJ: ' + (e.reason?.message || e.reason || 'unknown');
});

// ==========================================================
// AudioWorklet processor source — inlined as string, loaded via Blob URL.
// Runs in the audio rendering thread for low-latency, glitch-free FM synthesis.
// ==========================================================
const WORKLET_SRC = `
class FMProcessor extends AudioWorkletProcessor {
  constructor() {
    super();
    this.numVoices = 6;
    this.voices = [];
    for (let i = 0; i < this.numVoices; i++) {
      this.voices.push({
        active: false, noteOn: false,
        freq: 0, velocity: 0,
        carrierPhase: 0, modulatorPhase: 0,
        ampStage: 0, ampValue: 0,
        modStage: 0, modValue: 0,
      });
    }
    // INIT EP patch — classic FM electric piano
    this.patch = {
      carrierRatio: 1.0,
      modRatio: 14.0,
      modIndex: 2.4,
      ampAttack: 0.003, ampDecay: 1.2, ampSustain: 0.35, ampRelease: 0.4,
      modAttack: 0.003, modDecay: 0.35, modSustain: 0.08, modRelease: 0.2,
    };
    this.TWO_PI = Math.PI * 2;
    this.port.onmessage = (e) => this.handleMessage(e.data);
  }

  handleMessage(m) {
    if (m.type === 'noteOn') {
      const v = this.voices[m.voiceId];
      if (!v) return;
      v.active = true; v.noteOn = true;
      v.freq = 440 * Math.pow(2, (m.midi - 69) / 12);
      v.velocity = Math.max(0.1, m.velocity / 127);
      v.carrierPhase = 0; v.modulatorPhase = 0;
      v.ampStage = 1; v.ampValue = 0;
      v.modStage = 1; v.modValue = 0;
    } else if (m.type === 'noteOff') {
      const v = this.voices[m.voiceId];
      if (!v) return;
      v.noteOn = false;
      v.ampStage = 4; v.modStage = 4;
    } else if (m.type === 'patch') {
      Object.assign(this.patch, m.patch);
    } else if (m.type === 'allOff') {
      for (const v of this.voices) { v.active = false; v.noteOn = false; v.ampStage = 0; }
    }
  }

  // Simple ADSR tick. Returns false when voice fully faded.
  stepEnv(v, envStageKey, envValueKey, a, d, s, r, sr) {
    const stage = v[envStageKey];
    let val = v[envValueKey];
    if (stage === 1) { // attack
      const rate = 1 / (a * sr + 1);
      val += (1.0 - val) * rate;
      if (val >= 0.995) { val = 1.0; v[envStageKey] = 2; }
    } else if (stage === 2) { // decay
      const rate = 1 / (d * sr + 1);
      val += (s - val) * rate;
      if (Math.abs(val - s) < 0.0005) { val = s; v[envStageKey] = 3; }
    } else if (stage === 3) {
      val = s; // sustain
    } else if (stage === 4) { // release
      const rate = 1 / (r * sr + 1);
      val *= (1 - rate);
      if (val < 0.0003) { val = 0; v[envStageKey] = 0; v[envValueKey] = 0; return false; }
    } else {
      return false;
    }
    v[envValueKey] = val;
    return true;
  }

  process(inputs, outputs) {
    const out = outputs[0];
    if (!out || out.length === 0) return true;
    const left = out[0];
    const right = out[1] || left;
    const sr = sampleRate;
    const p = this.patch;
    const twoPi = this.TWO_PI;
    const frames = left.length;

    for (let i = 0; i < frames; i++) {
      let sample = 0;
      for (let vi = 0; vi < this.numVoices; vi++) {
        const v = this.voices[vi];
        if (!v.active) continue;

        const ampAlive = this.stepEnv(v, 'ampStage', 'ampValue',
          p.ampAttack, p.ampDecay, p.ampSustain, p.ampRelease, sr);
        this.stepEnv(v, 'modStage', 'modValue',
          p.modAttack, p.modDecay, p.modSustain, p.modRelease, sr);

        if (!ampAlive) { v.active = false; continue; }

        // Modulator
        const modFreq = v.freq * p.modRatio;
        v.modulatorPhase += modFreq / sr;
        if (v.modulatorPhase >= 1) v.modulatorPhase -= 1;
        const modSig = Math.sin(twoPi * v.modulatorPhase) * v.modValue * p.modIndex;

        // Carrier with modulation applied to phase
        const carrierFreq = v.freq * p.carrierRatio;
        v.carrierPhase += carrierFreq / sr;
        if (v.carrierPhase >= 1) v.carrierPhase -= 1;
        const carrierSig = Math.sin(twoPi * v.carrierPhase + modSig)
                           * v.ampValue * v.velocity;

        sample += carrierSig;
      }
      // Attenuate for polyphony + gentle saturation for warmth
      const mixed = sample * 0.28;
      const saturated = Math.tanh(mixed);
      left[i] = saturated;
      right[i] = saturated;
    }
    return true;
  }
}
registerProcessor('fm-processor', FMProcessor);
`;

// ==========================================================
// Main-thread synth controller
// ==========================================================
class FMLabTiny {
  constructor() {
    this.ctx = null;
    this.node = null;
    this.numVoices = 6;
    this.voices = Array.from({ length: this.numVoices }, (_, id) => ({
      id, midi: -1, startTime: 0,
    }));
    this.started = false;
  }

  async start() {
    if (this.started) return;
    this.ctx = new (window.AudioContext || window.webkitAudioContext)({ latencyHint: 'interactive' });
    if (this.ctx.state !== 'running') await this.ctx.resume();

    const blob = new Blob([WORKLET_SRC], { type: 'application/javascript' });
    const url = URL.createObjectURL(blob);
    try {
      await this.ctx.audioWorklet.addModule(url);
    } finally {
      URL.revokeObjectURL(url);
    }
    this.node = new AudioWorkletNode(this.ctx, 'fm-processor', {
      numberOfInputs: 0, numberOfOutputs: 1, outputChannelCount: [2],
    });
    this.node.connect(this.ctx.destination);
    this.started = true;
  }

  allocVoice(midi) {
    // Prefer free voice, else steal oldest
    let idx = this.voices.findIndex(v => v.midi < 0);
    if (idx < 0) {
      idx = this.voices.reduce((oldest, v, i) =>
        v.startTime < this.voices[oldest].startTime ? i : oldest, 0);
      this.node.port.postMessage({ type: 'noteOff', voiceId: idx });
    }
    this.voices[idx].midi = midi;
    this.voices[idx].startTime = performance.now();
    return idx;
  }

  noteOn(midi, velocity) {
    const voiceId = this.allocVoice(midi);
    this.node.port.postMessage({ type: 'noteOn', voiceId, midi, velocity });
    return voiceId;
  }

  noteOff(voiceId) {
    if (voiceId == null || voiceId < 0) return;
    this.voices[voiceId].midi = -1;
    this.node.port.postMessage({ type: 'noteOff', voiceId });
  }

  activeVoiceCount() {
    return this.voices.filter(v => v.midi >= 0).length;
  }
}

// ==========================================================
// Canvas keybed with multi-touch, y-velocity, octave shift
// ==========================================================
class Keybed {
  constructor(canvas, onNoteOn, onNoteOff) {
    this.canvas = canvas;
    this.ctx2d = canvas.getContext('2d');
    this.onNoteOn = onNoteOn;
    this.onNoteOff = onNoteOff;
    this.octaveBase = 48; // MIDI C3
    this.numOctaves = 2;
    this.touches = new Map(); // pointerId -> { voiceId, midi, keyIdx }
    this.pressed = new Set(); // keyIdx pressed
    this.resize();
    window.addEventListener('resize', () => this.resize());
    canvas.addEventListener('pointerdown', this.onDown.bind(this));
    canvas.addEventListener('pointermove', this.onMove.bind(this));
    canvas.addEventListener('pointerup', this.onUp.bind(this));
    canvas.addEventListener('pointercancel', this.onUp.bind(this));
    canvas.addEventListener('pointerleave', this.onUp.bind(this));
  }

  resize() {
    const dpr = window.devicePixelRatio || 1;
    const rect = this.canvas.getBoundingClientRect();
    this.canvas.width = Math.floor(rect.width * dpr);
    this.canvas.height = Math.floor(rect.height * dpr);
    this.ctx2d.setTransform(dpr, 0, 0, dpr, 0, 0);
    this.w = rect.width;
    this.h = rect.height;
    this.draw();
  }

  // Semitone offsets: white = [0,2,4,5,7,9,11], black = [1,3,6,8,10]
  isBlack(semiOff) { return [1,3,6,8,10].includes(semiOff); }

  keyAt(x, y) {
    const whitesPerOctave = 7;
    const whiteCount = whitesPerOctave * this.numOctaves;
    const whiteW = this.w / whiteCount;
    const blackH = this.h * 0.62;
    const blackW = whiteW * 0.6;

    // Build positions
    const whiteMidis = [];
    const blackKeys = []; // { x, midi }
    const whitesPattern = [0,2,4,5,7,9,11];
    const blacksPattern = [1,3,6,8,10];
    for (let o = 0; o < this.numOctaves; o++) {
      for (const s of whitesPattern) whiteMidis.push(this.octaveBase + 12*o + s);
      for (const s of blacksPattern) {
        const midi = this.octaveBase + 12*o + s;
        // Black key position: centered on boundary after the correct white
        // After C(0)=white0, D(2)=white1, F(5)=white3, G(7)=white4, A(9)=white5
        const leftWhite = { 1: 0, 3: 1, 6: 3, 8: 4, 10: 5 }[s] + o * 7;
        const bx = (leftWhite + 1) * whiteW - blackW / 2;
        blackKeys.push({ x: bx, midi });
      }
    }
    // Black keys hit-tested first (they float on top)
    if (y < blackH) {
      for (const bk of blackKeys) {
        if (x >= bk.x && x < bk.x + blackW) return { midi: bk.midi, isBlack: true, yInKey: y / blackH };
      }
    }
    // White
    const wi = Math.floor(x / whiteW);
    if (wi < 0 || wi >= whiteMidis.length) return null;
    return { midi: whiteMidis[wi], isBlack: false, yInKey: y / this.h };
  }

  draw() {
    const c = this.ctx2d;
    const whitesPerOctave = 7;
    const whiteCount = whitesPerOctave * this.numOctaves;
    const whiteW = this.w / whiteCount;
    const blackH = this.h * 0.62;
    const blackW = whiteW * 0.6;

    c.clearRect(0, 0, this.w, this.h);
    c.fillStyle = '#000';
    c.fillRect(0, 0, this.w, this.h);

    const whitesPattern = [0,2,4,5,7,9,11];
    const blacksPattern = [1,3,6,8,10];

    // Whites
    for (let o = 0; o < this.numOctaves; o++) {
      for (let i = 0; i < whitesPattern.length; i++) {
        const midi = this.octaveBase + 12*o + whitesPattern[i];
        const x = (o * 7 + i) * whiteW;
        const pressed = this.pressed.has(midi);
        c.fillStyle = pressed ? 'var(--key-white-press)' : '#efe8d8';
        if (pressed) c.fillStyle = '#c8d48a';
        c.fillRect(x + 1, 1, whiteW - 2, this.h - 2);
        c.strokeStyle = '#242938';
        c.lineWidth = 1;
        c.strokeRect(x + 0.5, 0.5, whiteW - 1, this.h - 1);
      }
    }
    // Octave label on first C
    c.fillStyle = '#8a92a6';
    c.font = '10px ui-monospace, Menlo, monospace';
    c.fillText('C' + Math.floor(this.octaveBase / 12 - 1), 4, this.h - 6);

    // Blacks
    for (let o = 0; o < this.numOctaves; o++) {
      for (const s of blacksPattern) {
        const midi = this.octaveBase + 12*o + s;
        const leftWhite = { 1: 0, 3: 1, 6: 3, 8: 4, 10: 5 }[s] + o * 7;
        const bx = (leftWhite + 1) * whiteW - blackW / 2;
        const pressed = this.pressed.has(midi);
        c.fillStyle = pressed ? '#22b8a0' : '#1a1a1a';
        c.fillRect(bx, 0, blackW, blackH);
        c.strokeStyle = '#000';
        c.strokeRect(bx + 0.5, 0.5, blackW - 1, blackH - 1);
      }
    }
  }

  velocityFromY(hit) {
    // Top of key = high velocity, bottom = soft
    const y = Math.max(0, Math.min(1, hit.yInKey));
    return Math.floor(40 + (1 - y) * 87); // range ~40..127
  }

  onDown(e) {
    e.preventDefault();
    this.canvas.setPointerCapture(e.pointerId);
    const rect = this.canvas.getBoundingClientRect();
    const hit = this.keyAt(e.clientX - rect.left, e.clientY - rect.top);
    if (!hit) return;
    const velocity = this.velocityFromY(hit);
    const voiceId = this.onNoteOn(hit.midi, velocity);
    this.touches.set(e.pointerId, { voiceId, midi: hit.midi });
    this.pressed.add(hit.midi);
    this.draw();
  }

  onMove(e) {
    const t = this.touches.get(e.pointerId);
    if (!t) return;
    // Simple glide: if pointer moves to a different key, release old + press new
    const rect = this.canvas.getBoundingClientRect();
    const hit = this.keyAt(e.clientX - rect.left, e.clientY - rect.top);
    if (!hit || hit.midi === t.midi) return;
    this.onNoteOff(t.voiceId);
    this.pressed.delete(t.midi);
    const velocity = this.velocityFromY(hit);
    const voiceId = this.onNoteOn(hit.midi, velocity);
    this.touches.set(e.pointerId, { voiceId, midi: hit.midi });
    this.pressed.add(hit.midi);
    this.draw();
  }

  onUp(e) {
    const t = this.touches.get(e.pointerId);
    if (!t) return;
    this.onNoteOff(t.voiceId);
    this.pressed.delete(t.midi);
    this.touches.delete(e.pointerId);
    this.draw();
  }

  shiftOctave(delta) {
    const next = this.octaveBase + delta * 12;
    if (next < 12 || next > 108) return;
    // Release anything held before shifting
    for (const [pid, t] of this.touches) this.onNoteOff(t.voiceId);
    this.touches.clear();
    this.pressed.clear();
    this.octaveBase = next;
    this.draw();
    return this.octaveBase;
  }
}

// ==========================================================
// Boot
// ==========================================================
const synth = new FMLabTiny();
let keybed = null;

function octaveLabel(base) {
  const octNum = Math.floor(base / 12) - 1;
  return `C${octNum} — C${octNum + 2}`;
}

function updateVoiceBadge() {
  const n = synth.activeVoiceCount();
  document.getElementById('voices').textContent = `${n}/6 voices`;
  document.getElementById('op1').classList.toggle('on', n > 0);
  document.getElementById('op2').classList.toggle('on', n > 0);
}

document.getElementById('startBtn').addEventListener('click', async () => {
  const btn = document.getElementById('startBtn');
  btn.disabled = true;
  btn.textContent = 'Loading…';
  try {
    await synth.start();
    document.getElementById('splash').classList.add('hidden');
    document.getElementById('app').style.visibility = 'visible';

    keybed = new Keybed(
      document.getElementById('keybed'),
      (midi, vel) => { const vid = synth.noteOn(midi, vel); updateVoiceBadge(); return vid; },
      (vid) => { synth.noteOff(vid); setTimeout(updateVoiceBadge, 50); }
    );
    document.getElementById('octDisplay').textContent = octaveLabel(keybed.octaveBase);

    document.getElementById('octDown').addEventListener('click', () => {
      const b = keybed.shiftOctave(-1);
      if (b != null) document.getElementById('octDisplay').textContent = octaveLabel(b);
    });
    document.getElementById('octUp').addEventListener('click', () => {
      const b = keybed.shiftOctave(+1);
      if (b != null) document.getElementById('octDisplay').textContent = octaveLabel(b);
    });
  } catch (e) {
    btn.disabled = false;
    btn.textContent = 'Start';
    errEl.textContent = 'Start failed: ' + (e.message || e);
  }
});
</script>
</body>
</html>
